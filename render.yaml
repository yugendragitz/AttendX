services:
  - type: web
    name: attendx-backend
    runtime: docker
    plan: free
    repo: https://github.com/yugendragitz/AttendX
    branch: main
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: CORS_ORIGINS
        sync: false
